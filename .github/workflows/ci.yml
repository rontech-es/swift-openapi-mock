name: CI

on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
  pull_request:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'

jobs:
  test:
    name: Swift Tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test
